name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - apps/api/**
      - .github/workflows/deploy-api.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GAR_LOCATION: asia-southeast1
  GAR_REPOSITORY: tooseriuzdotcom-ar
  CLOUD_RUN_SERVICE: tooseriuzdotcom-api
  CLOUD_RUN_REGION: asia-southeast1
  IMAGE_NAME: api
  IMAGE_URI: asia-southeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/tooseriuzdotcom-ar/api
  PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: github-actions-deployer@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker "${GAR_LOCATION}-docker.pkg.dev" --quiet

      - name: Build image
        run: docker build -t "${IMAGE_URI}:${GITHUB_SHA}" -t "${IMAGE_URI}:latest" apps/api

      - name: Push image
        run: docker push --all-tags "${IMAGE_URI}"

      - name: Deploy to Cloud Run
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SSL_ENABLED: ${{ secrets.DB_SSL_ENABLED }}
          DB_PORT: ${{ secrets.DB_PORT }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          GCS_BUCKET_NAME: ${{ secrets.GCS_BUCKET_NAME }}
          GCS_PUBLIC_BASE_URL: ${{ secrets.GCS_PUBLIC_BASE_URL }}
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --image "${IMAGE_URI}:${GITHUB_SHA}" \
            --region "${CLOUD_RUN_REGION}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --set-env-vars "DB_NAME=${DB_NAME},DB_HOST=${DB_HOST},DB_USER=${DB_USER},DB_PASSWORD=${DB_PASSWORD},DB_SSL_ENABLED=${DB_SSL_ENABLED},DB_PORT=${DB_PORT},ADMIN_TOKEN=${ADMIN_TOKEN},GCS_BUCKET_NAME=${GCS_BUCKET_NAME},GCS_PUBLIC_BASE_URL=${GCS_PUBLIC_BASE_URL}"
