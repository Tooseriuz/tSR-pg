openapi: 3.0.3
info:
  title: tSR-pg API
  version: 0.1.0
paths:
  /health:
    get:
      operationId: getHealth
      summary: Health check endpoint
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /journeys:
    get:
      operationId: getJourneys
      summary: List journeys
      responses:
        '200':
          description: Journeys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JourneysResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    Journey:
      type: object
      required:
        - name
        - timestamp
        - location
        - thumbnail
      properties:
        name:
          type: string
        timestamp:
          type: string
        location:
          type: string
        thumbnail:
          type: string
    JourneysResponse:
      type: array
      items:
        $ref: '#/components/schemas/Journey'
